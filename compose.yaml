name: mova

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "file:/data/mova.db?_pragma=busy_timeout%285000%29&_pragma=journal_mode%28WAL%29&_pragma=foreign_keys%281%29"
      APP_ORIGIN: "${APP_ORIGIN:-http://localhost}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      LIVEKIT_URL: "${LIVEKIT_URL:-ws://localhost:7880}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-devkey}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-secretsecretsecretsecretsecretsecret}"
      LIVEKIT_TOKEN_TTL: "10m"
    volumes:
      - mova_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      livekit:
        condition: service_started
    networks:
      - app

  web:
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - app

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      APP_ADDRESS: "${APP_ADDRESS:-http://localhost}"
      LIVEKIT_ADDRESS: "${LIVEKIT_ADDRESS:-http://livekit.localhost}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - app

  livekit:
    image: livekit/livekit-server:v1.13.1
    restart: unless-stopped
    network_mode: host
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        log_level: info
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: true
        turn:
          enabled: true
          udp_port: 3478
          relay_range_start: 40000
          relay_range_end: 40100
        keys:
          ${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secretsecretsecretsecretsecretsecret}

networks:
  app:

volumes:
  mova_data:
  caddy_data:
  caddy_config:
