<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mowa — голосовой звонок</title><link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="index.html"><span class="logo-mark"><i></i><i></i><i></i></span><span>Mowa</span></a>
    <div class="header-actions"><div class="user-mini"><strong>Анна Нова</strong><span>@anna_voice</span></div><button class="icon-btn">⚙</button><button class="icon-btn">↪</button></div>
  </header>
  <main class="room-page">
    <div class="room-top"><div><span class="room-state"><i class="live-dot"></i> В эфире</span><h1>Дизайн-синк</h1></div><button class="btn-secondary compact">⧉ Пригласить</button></div>
    <div class="call-grid">
      <section class="call-stage">
        <div class="voice-only"><div class="voice-bars"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div><h2>Сейчас только голос</h2><p>Любой участник может показать свой экран.</p></div>
      </section>
      <aside class="participants">
        <div class="card-heading"><h2>Участники</h2><span class="count">● 4</span></div>
        <div class="friend-list">
          <div class="friend participant-speaking"><div class="avatar">АН</div><div class="friend-info"><strong>Анна Нова (вы)</strong><span>говорит</span></div><span class="mic">♩</span></div>
          <div class="friend"><div class="avatar coral">МК</div><div class="friend-info"><strong>Максим Ковалёв</strong><span>слушает</span></div><span class="mic">♩</span></div>
          <div class="friend"><div class="avatar lime">ЕС</div><div class="friend-info"><strong>Елена Смирнова</strong><span>микрофон выключен</span></div><span class="mic off">×</span></div>
          <div class="friend"><div class="avatar">АР</div><div class="friend-info"><strong>Алексей Романов</strong><span>слушает</span></div><span class="mic">♩</span></div>
        </div>
      </aside>
    </div>
  </main>
  <nav class="control-dock" aria-label="Управление звонком"><button class="call-btn">♩</button><button class="call-btn wide">▣ <span>Экран</span></button><button class="call-btn">⚙</button><button class="call-btn danger">↪</button></nav>
</body>
</html>
