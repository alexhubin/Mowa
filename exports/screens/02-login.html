<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mowa — вход</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="index.html"><span class="logo-mark"><i></i><i></i><i></i></span><span>Mowa</span></a>
    <a class="btn-secondary compact" href="#">Создать аккаунт</a>
  </header>
  <main class="page auth-wrap">
    <section class="auth-card">
      <span class="eyebrow">С возвращением</span>
      <h1>Продолжим разговор</h1>
      <p>Войдите, чтобы вернуться к друзьям и своим комнатам.</p>
      <form class="form-stack">
        <label class="field">Email<input class="input" type="email" value="anna@example.com" readonly></label>
        <label class="field">Пароль<input class="input" type="password" value="password" readonly></label>
        <button class="btn" type="button">Войти <span aria-hidden="true">→</span></button>
      </form>
      <p class="form-footer">Нет аккаунта? <strong>Создать за минуту</strong></p>
    </section>
  </main>
</body>
</html>
