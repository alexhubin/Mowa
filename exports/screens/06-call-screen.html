<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mowa — демонстрация экрана</title><link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="index.html"><span class="logo-mark"><i></i><i></i><i></i></span><span>Mowa</span></a>
    <div class="header-actions"><div class="user-mini"><strong>Анна Нова</strong><span>@anna_voice</span></div><button class="icon-btn">⚙</button><button class="icon-btn">↪</button></div>
  </header>
  <main class="room-page">
    <div class="room-top"><div><span class="room-state"><i class="live-dot"></i> В эфире · экран Максима</span><h1>Дизайн-синк</h1></div><button class="btn-secondary compact">⧉ Пригласить</button></div>
    <div class="call-grid">
      <section class="call-stage">
        <div class="share-preview"><div class="share-browser"><i></i><i></i><i></i></div><div class="share-content"><div class="share-side"></div><div class="share-main"><i></i><i></i><i></i><i></i><i></i><i></i></div></div></div>
      </section>
      <aside class="participants">
        <div class="card-heading"><h2>Участники</h2><span class="count">● 3</span></div>
        <div class="friend-list">
          <div class="friend"><div class="avatar">АН</div><div class="friend-info"><strong>Анна Нова (вы)</strong><span>слушает</span></div><span class="mic">♩</span></div>
          <div class="friend participant-speaking"><div class="avatar coral">МК</div><div class="friend-info"><strong>Максим Ковалёв</strong><span>говорит · показывает экран</span></div><span class="mic">♩</span></div>
          <div class="friend"><div class="avatar lime">ЕС</div><div class="friend-info"><strong>Елена Смирнова</strong><span>микрофон выключен</span></div><span class="mic off">×</span></div>
        </div>
      </aside>
    </div>
  </main>
  <nav class="control-dock" aria-label="Управление звонком"><button class="call-btn">♩</button><button class="call-btn wide active">■ <span>Остановить</span></button><button class="call-btn">⚙</button><button class="call-btn danger">↪</button></nav>
</body>
</html>
